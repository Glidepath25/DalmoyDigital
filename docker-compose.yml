services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dalmoy_digital_app
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3000}
      DATABASE_URL: ${DATABASE_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXT_TELEMETRY_DISABLED: ${NEXT_TELEMETRY_DISABLED:-1}
      BCRYPT_SALT_ROUNDS: ${BCRYPT_SALT_ROUNDS:-12}
    ports:
      - "3000:3000"
    volumes:
      - dalmoy_digital_uploads:/app/uploads
    restart: unless-stopped

  db:
    image: postgres:16
    container_name: dalmoy_digital_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dalmoy_digital
    ports:
      - "5432:5432"
    volumes:
      - dalmoy_digital_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dalmoy_digital"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

volumes:
  dalmoy_digital_pgdata:
  dalmoy_digital_uploads:
